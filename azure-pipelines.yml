trigger:
  branches:
    include:
      - main

variables:
  # Name of the Azure DevOps service connection (Project Settings → Service connections)
  serviceConnection: 'azure-service-connection'

  # Must match the App Service name in infra/main.bicepparam (param appName)
  webAppName: 'drupal-app-service'

  phpVersion: '8.3'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Build
    displayName: 'Build'
    jobs:
      - job: ComposerBuild
        displayName: 'Composer Install & Package'
        steps:
          - task: UsePhpVersion@0
            displayName: 'Use PHP $(phpVersion)'
            inputs:
              versionSpec: $(phpVersion)

          - script: php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');" && php composer-setup.php --quiet && rm composer-setup.php
            displayName: 'Install Composer'

          - script: php composer.phar install --no-dev --optimize-autoloader --no-interaction
            displayName: 'composer install (no dev dependencies)'

          - task: ArchiveFiles@2
            displayName: 'Zip application'
            inputs:
              rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
              replaceExistingArchive: true
              # Exclude infra, git history, and private notes from the deployment package
              excludePaths: |
                $(System.DefaultWorkingDirectory)/.git
                $(System.DefaultWorkingDirectory)/infra
                $(System.DefaultWorkingDirectory)/private
                $(System.DefaultWorkingDirectory)/composer-setup.php
                $(System.DefaultWorkingDirectory)/composer.phar

          - task: PublishBuildArtifacts@1
            displayName: 'Publish artifact'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/app.zip'
              ArtifactName: 'drupal-app'

  - stage: Deploy
    displayName: 'Deploy to Azure App Service'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployDrupal
        displayName: 'Deploy Drupal'
        environment: 'dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  displayName: 'Deploy to App Service'
                  inputs:
                    azureSubscription: $(serviceConnection)
                    appType: 'webAppLinux'
                    appName: $(webAppName)
                    package: '$(Pipeline.Workspace)/drupal-app/app.zip'
                    runtimeStack: 'PHP|$(phpVersion)'
                    # startup.sh is invoked via appCommandLine set in Bicep;
                    # do not override it here unless you need a different command.